<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 20px; background: white; }
        .logo-container { 
            width: 300px; 
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .tech-text {
            color: #B3B3B3;
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .sap-box {
            background: #0070F2;
            padding: 20px;
            position: relative;
        }
        .sap-text {
            color: white;
            font-size: 70px;
            font-weight: bold;
            margin: 0;
        }
        .tm {
            position: absolute;
            top: 5px;
            right: 5px;
            color: #0070F2;
            background: white;
            padding: 2px 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .partner-text {
            color: #B3B3B3;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 3px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid #333;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="tech-text">TECHNOLOGY</div>
        <div class="sap-box">
            <div class="sap-text">SAP</div>
            <div class="tm">TM</div>
        </div>
        <div class="partner-text">GLOBAL PARTNER</div>
    </div>
</body>
</html>
